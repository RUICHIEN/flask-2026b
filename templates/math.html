<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>∧√</title>
</head>
<body>
<h2>次方與根號計算</h2>

<form method="post">
    x：<input type="number" name="x"><br><br>

    運算：
    <select name="opt">
        <option value="^">∧次方</option>
        <option value="√">√開根號</option>
    </select>
    <br><br>

    y：<input type="number" name="y"><br><br>

    <input type="submit" value="計算">
</form>

{% if result is not none %}
    <h3>結果：{{ result }}</h3>
{% endif %}

<br>
<a href="/">返回首頁</a>
</body>
</html>
